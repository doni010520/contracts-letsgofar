version: '3.8'

services:
  app:
    build: .
    ports:
      - "3050:3050"
    environment:
      - DATABASE_HOST=db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=contracts_production
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=production
      - RAILS_SERVE_STATIC_FILES=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - APP_HOST=${APP_HOST:-localhost:3000}
      - APP_PROTOCOL=${APP_PROTOCOL:-http}
      - MAIL_FROM=${MAIL_FROM:-contratos@letsgofar.com.br}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      - db
      - redis
    command: >
      sh -c "bundle exec rails db:prepare && 
             bundle exec rails db:seed &&
             bundle exec puma -C config/puma.rb"

  sidekiq:
    build: .
    environment:
      - DATABASE_HOST=db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=contracts_production
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - APP_HOST=${APP_HOST:-localhost:3000}
      - APP_PROTOCOL=${APP_PROTOCOL:-http}
      - MAIL_FROM=${MAIL_FROM:-contratos@letsgofar.com.br}
    depends_on:
      - db
      - redis
    command: bundle exec sidekiq

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_DB=contracts_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
